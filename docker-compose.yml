# Dev infrastructure for FleetWatch (Fase 0 — T006).
# App + worker containers are added in the deploy phase (Fase 12); for local
# development the app/worker run on the host against these services.
services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetwatch
      POSTGRES_PASSWORD: fleetwatch
      POSTGRES_DB: fleetwatch
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleetwatch']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fleetwatch-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
